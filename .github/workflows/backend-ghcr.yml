name: Publish Backend Image

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'Dockerfile.backend'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradlew'
      - 'gradle/**'
      - 'src/**'
      - '.github/workflows/backend-ghcr.yml'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/gdeiassistant/gdeiassistant-backend

jobs:
  build-and-push:
    name: Build and Push Backend Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=GdeiAssistant Backend
            org.opencontainers.image.description=Spring Boot backend image for GdeiAssistant
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output published tags
        run: |
          echo "Published image tags:"
          echo "${{ steps.meta.outputs.tags }}"
