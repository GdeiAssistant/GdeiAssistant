# =============================================================================
# GdeiAssistant 测试环境全栈
# 单一配置入口：项目根目录 .env
# 使用：docker compose -f docker-compose-staging.yml up -d
# =============================================================================

networks:
  gdei-staging:
    name: ${STAGING_COMPOSE_NETWORK_NAME:-gdei-staging}
    driver: bridge

services:
  mysql:
    image: mysql:8.0
    container_name: gdei-mysql-staging
    networks:
      - gdei-staging
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD is required for staging}"
      MYSQL_CHARSET: utf8mb4
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./db-init/mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:?DB_PASSWORD is required for staging}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: gdei-redis-staging
    networks:
      - gdei-staging
    env_file:
      - .env
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD";
        else
          exec redis-server --appendonly yes;
        fi
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" ping;
          else
            redis-cli ping;
          fi
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    container_name: gdei-mongo-staging
    networks:
      - gdei-staging
    volumes:
      - ./db-init/mongodb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  gdeiassistant-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: gdeiassistant-backend:staging
    container_name: gdeiassistant-backend-staging
    networks:
      - gdei-staging
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      mongodb: { condition: service_healthy }
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: staging
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: "${DB_NAME:-gdeiassistant}"
      DB_NAME_LOG: "${DB_NAME_LOG:-gdeiassistant_log}"
      DB_NAME_DATA: "${DB_NAME_DATA:-gdeiassistant_data}"
      DB_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD is required for staging}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      REDIS_DATABASE: "${REDIS_DATABASE:-0}"
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DATABASE: "${MONGO_DATABASE:-gdeiassistant}"
      SERVER_PORT: 8080
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required for staging}"
      CRON_SECRET: "${CRON_SECRET:?CRON_SECRET is required for staging}"
      ENCRYPT_ENABLE: "true"
      ENCRYPT_PRIVATE_KEY: "${ENCRYPT_PRIVATE_KEY:?ENCRYPT_PRIVATE_KEY is required for staging}"
    restart: unless-stopped

  gdeiassistant-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_APP_BASE_API: "${VITE_APP_BASE_API:-/api}"
        VITE_PE_EXTERNAL_URL: "${VITE_PE_EXTERNAL_URL:-}"
    image: gdeiassistant-frontend:staging
    container_name: gdeiassistant-frontend-staging
    networks:
      - gdei-staging
    depends_on:
      - gdeiassistant-backend
    ports:
      - "${FRONTEND_STAGING_EXPOSE_PORT:-8088}:80"
    restart: unless-stopped
