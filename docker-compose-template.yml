# =============================================================================
# GdeiAssistant 生产环境全栈 - GitHub 模板（占位符版本，可提交到 Git）
# 所有变量与 .env.template 对应；复制 .env.template 为 .env 并填入真实值后使用
# 生产时在 .env 中设置 DB_HOST=mysql、REDIS_HOST=redis、MONGO_HOST=mongodb
# =============================================================================

networks:
  gdei-network:
    name: gdei-network
    driver: bridge

services:
  mysql:
    image: mysql:8.0
    container_name: gdei-mysql
    networks:
      - gdei-network
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-YOUR_SECURE_DB_PASSWORD}"
      MYSQL_CHARSET: utf8mb4
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./db-init/mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-YOUR_SECURE_DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: gdei-redis
    networks:
      - gdei-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    container_name: gdei-mongo
    networks:
      - gdei-network
    volumes:
      - ./db-init/mongodb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  gdeiassistant-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: gdeiassistant-backend:latest
    container_name: gdeiassistant-backend
    networks:
      - gdei-network
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      mongodb: { condition: service_healthy }
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: "${DB_HOST:-mysql}"
      DB_PORT: "${DB_PORT:-3306}"
      DB_NAME: "${DB_NAME:-gdeiassistant}"
      DB_PASSWORD: "${DB_PASSWORD:-YOUR_SECURE_DB_PASSWORD}"
      REDIS_HOST: "${REDIS_HOST:-redis}"
      REDIS_PORT: "${REDIS_PORT:-6379}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      REDIS_DATABASE: "${REDIS_DATABASE:-0}"
      MONGO_HOST: "${MONGO_HOST:-mongodb}"
      MONGO_PORT: "${MONGO_PORT:-27017}"
      MONGO_DATABASE: "${MONGO_DATABASE:-gdeiassistant}"
      JWT_SECRET: "${JWT_SECRET:-YOUR_SECURE_JWT_SECRET}"
      EMAIL_SMTP_HOST: "${EMAIL_SMTP_HOST:-}"
      EMAIL_SMTP_PORT: "${EMAIL_SMTP_PORT:-465}"
      EMAIL_SMTP_USERNAME: "${EMAIL_SMTP_USERNAME:-}"
      EMAIL_SMTP_PASSWORD: "${EMAIL_SMTP_PASSWORD:-}"
      EMAIL_FEEDBACK: "${EMAIL_FEEDBACK:-}"
      EMAIL_TICKET: "${EMAIL_TICKET:-}"
      WECHAT_APP_APPID: "${WECHAT_APP_APPID:-}"
      WECHAT_APP_SECRET: "${WECHAT_APP_SECRET:-}"
      R2_ENDPOINT: "${R2_ENDPOINT:-}"
      R2_ACCESS_KEY_ID: "${R2_ACCESS_KEY_ID:-}"
      R2_SECRET_ACCESS_KEY: "${R2_SECRET_ACCESS_KEY:-}"
      R2_BUCKET_NAME: "${R2_BUCKET_NAME:-gdeiassistant-userdata}"
      R2_CUSTOM_DOMAIN: "${R2_CUSTOM_DOMAIN:-}"
    restart: unless-stopped

  gdeiassistant-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: gdeiassistant-frontend:latest
    container_name: gdeiassistant-frontend
    networks:
      - gdei-network
    depends_on:
      - gdeiassistant-backend
    ports:
      - "80:80"
    restart: unless-stopped
