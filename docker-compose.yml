# =============================================================================
# GdeiAssistant 开发环境全栈
# 单一配置入口：项目根目录 .env
# 启动：docker compose up -d
# =============================================================================

networks:
  gdei-dev:
    name: ${DEV_COMPOSE_NETWORK_NAME:-gdei-dev}
    driver: bridge

services:
  mysql:
    image: mysql:8.0
    container_name: gdei-mysql
    networks:
      - gdei-dev
    ports:
      - "${MYSQL_EXPOSE_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD is required}"
      MYSQL_CHARSET: utf8mb4
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db-init/mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "sh", "-c", "mysqladmin ping -h localhost -uroot -p\"$$MYSQL_ROOT_PASSWORD\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:alpine
    container_name: gdei-redis
    networks:
      - gdei-dev
    env_file:
      - .env
    ports:
      - "${REDIS_EXPOSE_PORT:-6379}:6379"
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD";
        else
          exec redis-server --appendonly yes;
        fi
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" ping;
          else
            redis-cli ping;
          fi
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:latest
    container_name: gdei-mongo
    networks:
      - gdei-dev
    ports:
      - "${MONGO_EXPOSE_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
      - ./db-init/mongodb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: gdeiassistant-backend:development
    container_name: gdeiassistant-backend-development
    networks:
      - gdei-dev
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: development
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: "${DB_NAME:-gdeiassistant}"
      DB_NAME_LOG: "${DB_NAME_LOG:-gdeiassistant_log}"
      DB_NAME_DATA: "${DB_NAME_DATA:-gdeiassistant_data}"
      DB_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD is required}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      REDIS_DATABASE: "${REDIS_DATABASE:-0}"
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DATABASE: "${MONGO_DATABASE:-gdeiassistant}"
      SERVER_PORT: 8080
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required}"
    ports:
      - "${BACKEND_EXPOSE_PORT:-8080}:8080"

  frontend:
    image: node:24.14.1-alpine
    container_name: gdeiassistant-frontend-development
    networks:
      - gdei-dev
    env_file:
      - .env
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    environment:
      VITE_APP_BASE_API: "${VITE_APP_BASE_API:-http://localhost:8080/api}"
    ports:
      - "${FRONTEND_EXPOSE_PORT:-5173}:5173"
    depends_on:
      - backend

volumes:
  mysql-data:
  mongo-data:
  redis-data:
  frontend-node-modules:
