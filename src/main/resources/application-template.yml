# =============================================================================
# 警告：禁止在生产环境中使用默认弱密码！请通过环境变量或 application-prod.yml 注入真实密码。
# =============================================================================
# GdeiAssistant 配置模板（可提交到 Git）
#
# 使用说明：
# 1. 复制本文件为 application-dev.yml 或 application-prod.yml。
# 2. 所有 ${VAR:default} 均可由系统环境变量或 .env 提供；未设置时使用默认值。
# 3. 推荐：项目根目录使用 .env（复制 .env.template 为 .env 并填入真实值），
#    Gradle bootRun 会自动加载 .env，Docker Compose 也会读取 .env。
# 4. application-dev.yml / application-prod.yml 已加入 .gitignore，勿提交。
# =============================================================================

spring:
  datasource:
    app:
      # 数据库连接：由 DB_HOST、DB_PORT、DB_NAME、DB_PASSWORD 提供（.env 或环境变量）
      jdbc-url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:gdeiassistant}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      username: root
      password: ${DB_PASSWORD}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
    log:
      jdbc-url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME_LOG:gdeiassistant_log}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      username: root
      password: ${DB_PASSWORD}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 5
    data:
      jdbc-url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME_DATA:gdeiassistant_data}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      username: root
      password: ${DB_PASSWORD}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 5

  # Redis：REDIS_HOST、REDIS_PORT、REDIS_PASSWORD、REDIS_DATABASE
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}

  # MongoDB：MONGO_HOST、MONGO_PORT、MONGO_DATABASE
  data:
    mongodb:
      uri: mongodb://${MONGO_HOST:localhost}:${MONGO_PORT:27017}
      database: ${MONGO_DATABASE:gdeiassistant}

logging:
  level:
    root: INFO
    cn.gdeiassistant: DEBUG
    org.springframework.web: DEBUG
    org.mybatis: DEBUG
    java.sql: DEBUG
    org.apache.ibatis: DEBUG

mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 必填：JWT 签名密钥，可由 JWT_SECRET 环境变量或 .env 提供
jwt:
  secret: ${JWT_SECRET:YOUR_SECURE_JWT_SECRET_AT_LEAST_32_CHARS}

# 以下为可选配置，留空则对应功能降级
email:
  smtp:
    host: ${EMAIL_SMTP_HOST:}
    port: 465
    username: ${EMAIL_SMTP_USERNAME:}
    password: ${EMAIL_SMTP_PASSWORD:}
    auth: true
    timeout: 5000
  ssl:
    encryption: true
  feedback: ${EMAIL_FEEDBACK:}
  ticket: ${EMAIL_TICKET:}

wechat:
  dev:
    app:
      appid: ${WECHAT_DEV_APP_APPID:}
      secret: ${WECHAT_DEV_APP_SECRET:}
    account:
      appid: ${WECHAT_DEV_ACCOUNT_APPID:}
      appsecret: ${WECHAT_DEV_ACCOUNT_SECRET:}
      token: ${WECHAT_DEV_ACCOUNT_TOKEN:}
  pro:
    app:
      appid: ${WECHAT_PRO_APP_APPID:}
      secret: ${WECHAT_PRO_APP_SECRET:}
    account:
      appid: ${WECHAT_PRO_ACCOUNT_APPID:}
      appsecret: ${WECHAT_PRO_ACCOUNT_SECRET:}
      token: ${WECHAT_PRO_ACCOUNT_TOKEN:}
  app:
    appid: ${WECHAT_APP_APPID:}
    secret: ${WECHAT_APP_SECRET:}

encrypt:
  enable: false
  type: aes
  private:
    key: ${ENCRYPT_PRIVATE_KEY:}
  app:
    key: ${ENCRYPT_APP_KEY:}
  config:
    location: ${ENCRYPT_CONFIG_LOCATION:}

news:
  admin:
    account: ${NEWS_ADMIN_ACCOUNT:}
    password: ${NEWS_ADMIN_PASSWORD:}

api:
  # AI 验证码识别服务商显式选择：openai / gemini / doubao
  ai:
    ocr:
      # 注意：默认 openai；若只配置豆包/Google，请同步改 provider，避免误走 openai
      provider: ${AI_OCR_PROVIDER:openai}
      openai:
        api-key: ${OPENAI_API_KEY:}
        model: ${OPENAI_OCR_MODEL:gpt-4.1-mini}
      gemini:
        api-key: ${GEMINI_API_KEY:}
        model: ${GEMINI_OCR_MODEL:gemini-2.0-flash}
      doubao:
        api-key: ${DOUBAO_API_KEY:}
        model: ${DOUBAO_OCR_MODEL:doubao-1.5-vision-pro-32k}
        base-url: ${DOUBAO_OCR_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}
sms:
  # 可选：tencent / aliyun / huawei（可同时配置多家，但只会使用 provider 指定的一家）
  provider: ${SMS_PROVIDER:tencent}
  tencent:
    secret-id: ${TENCENT_SMS_SECRET_ID:}
    secret-key: ${TENCENT_SMS_SECRET_KEY:}
    region: ${TENCENT_SMS_REGION:ap-guangzhou}
    app-id: ${TENCENT_SMS_APP_ID:}
    sign-name: ${TENCENT_SMS_SIGN_NAME:}
    template:
      china: ${TENCENT_SMS_TEMPLATE_CHINA:}
      global: ${TENCENT_SMS_TEMPLATE_GLOBAL:}
  aliyun:
    userid: ${ALIYUN_SMS_USERID:}
    accesskey:
      id: ${ALIYUN_SMS_ACCESSKEY_ID:}
      secret: ${ALIYUN_SMS_ACCESSKEY_SECRET:}
    china:
      templatecode: ${ALIYUN_SMS_CHINA_TEMPLATE:}
    global:
      templatecode: ${ALIYUN_SMS_GLOBAL_TEMPLATE:}
  huawei:
    app-key: ${HUAWEI_SMS_APP_KEY:}
    app-secret: ${HUAWEI_SMS_APP_SECRET:}
    endpoint: ${HUAWEI_SMS_ENDPOINT:https://smsapi.cn-north-4.myhuaweicloud.com:443}
    sender: ${HUAWEI_SMS_SENDER:}
    signature: ${HUAWEI_SMS_SIGNATURE:}
    template:
      china: ${HUAWEI_SMS_TEMPLATE_CHINA:}
      global: ${HUAWEI_SMS_TEMPLATE_GLOBAL:}

request:
  validate:
    token: ${REQUEST_VALIDATE_TOKEN:}

trial:
  test-accounts:
    - gdeiassistant
app:
  test-accounts: gdeiassistant

r2:
  endpoint: ${R2_ENDPOINT:}
  accessKeyId: ${R2_ACCESS_KEY_ID:}
  secretAccessKey: ${R2_SECRET_ACCESS_KEY:}
  bucketName: ${R2_BUCKET_NAME:gdeiassistant-userdata}
  customDomain: ${R2_CUSTOM_DOMAIN:}

# 主题：0 正常，1 黑白/灰度（原 setting.properties 中的 theme.grayscale）
theme:
  grayscale: ${THEME_GRAYSCALE:0}
