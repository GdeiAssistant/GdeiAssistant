# =============================================================================
# GdeiAssistant 主配置
# 统一使用一份 application.yml，并通过环境变量或 .env 注入环境差异。
# =============================================================================

spring:
  application:
    name: GdeiAssistant
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:development}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  datasource:
    app:
      jdbc-url: ${DB_JDBC_URL_APP:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:gdeiassistant}?${DB_JDBC_PARAMS:useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}}
      username: ${DB_USERNAME:root}
      password: ${DB_PASSWORD:}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
    log:
      jdbc-url: ${DB_JDBC_URL_LOG:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME_LOG:gdeiassistant_log}?${DB_JDBC_PARAMS:useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}}
      username: ${DB_USERNAME:root}
      password: ${DB_PASSWORD:}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 5
    data:
      jdbc-url: ${DB_JDBC_URL_DATA:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME_DATA:gdeiassistant_data}?${DB_JDBC_PARAMS:useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}}
      username: ${DB_USERNAME:root}
      password: ${DB_PASSWORD:}
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        maximum-pool-size: 5
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}
  mongodb:
    uri: ${MONGO_URI:mongodb://${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${MONGO_DATABASE:gdeiassistant}}

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    default-statement-timeout: 30
    log-impl: ${MYBATIS_LOG_IMPL:}
  type-handlers-package: cn.gdeiassistant.common.typehandler

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    cn.gdeiassistant: ${LOG_LEVEL_APP:INFO}
    org.springframework.web: ${LOG_LEVEL_WEB:INFO}
    org.mybatis: ${LOG_LEVEL_MYBATIS:INFO}
    java.sql: ${LOG_LEVEL_SQL:INFO}
    org.apache.ibatis: ${LOG_LEVEL_IBATIS:DEBUG}
  file:
    name: logs/gdeiassistant.log

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

jwt:
  secret: ${JWT_SECRET:}

email:
  smtp:
    host: ${EMAIL_SMTP_HOST:}
    port: ${EMAIL_SMTP_PORT:465}
    username: ${EMAIL_SMTP_USERNAME:}
    password: ${EMAIL_SMTP_PASSWORD:}
    auth: true
    timeout: 5000
  ssl:
    encryption: true
  feedback: ${EMAIL_FEEDBACK:}
  ticket: ${EMAIL_TICKET:}

encrypt:
  enable: ${ENCRYPT_ENABLE:false}
  type: ${ENCRYPT_TYPE:aes}
  private:
    key: ${ENCRYPT_PRIVATE_KEY:}

api:
  ai:
    ocr:
      provider: ${AI_OCR_PROVIDER:deepseek}
      openai:
        api-key: ${OPENAI_API_KEY:}
        model: ${OPENAI_OCR_MODEL:gpt-4.1-mini}
      gemini:
        api-key: ${GEMINI_API_KEY:}
        model: ${GEMINI_OCR_MODEL:gemini-2.0-flash}
      claude:
        api-key: ${CLAUDE_API_KEY:}
        model: ${CLAUDE_OCR_MODEL:claude-sonnet-4-20250514}
        api-url: ${CLAUDE_OCR_API_URL:https://api.anthropic.com/v1/messages}
      deepseek:
        api-key: ${DEEPSEEK_API_KEY:}
        model: ${DEEPSEEK_OCR_MODEL:deepseek-chat}
        base-url: ${DEEPSEEK_OCR_BASE_URL:https://api.deepseek.com/v1}
      doubao:
        api-key: ${DOUBAO_API_KEY:}
        model: ${DOUBAO_OCR_MODEL:doubao-1.5-vision-pro-32k}
        base-url: ${DOUBAO_OCR_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}

sms:
  provider: ${SMS_PROVIDER:tencent}
  tencent:
    secret-id: ${TENCENT_SMS_SECRET_ID:}
    secret-key: ${TENCENT_SMS_SECRET_KEY:}
    region: ${TENCENT_SMS_REGION:ap-guangzhou}
    app-id: ${TENCENT_SMS_APP_ID:}
    sign-name: ${TENCENT_SMS_SIGN_NAME:}
    template:
      china: ${TENCENT_SMS_TEMPLATE_CHINA:}
      global: ${TENCENT_SMS_TEMPLATE_GLOBAL:}
  aliyun:
    userid: ${ALIYUN_SMS_USERID:}
    accesskey:
      id: ${ALIYUN_SMS_ACCESSKEY_ID:}
      secret: ${ALIYUN_SMS_ACCESSKEY_SECRET:}
    china:
      templatecode: ${ALIYUN_SMS_CHINA_TEMPLATE:}
    global:
      templatecode: ${ALIYUN_SMS_GLOBAL_TEMPLATE:}
  huawei:
    app-key: ${HUAWEI_SMS_APP_KEY:}
    app-secret: ${HUAWEI_SMS_APP_SECRET:}
    endpoint: ${HUAWEI_SMS_ENDPOINT:https://smsapi.cn-north-4.myhuaweicloud.com:443}
    sender: ${HUAWEI_SMS_SENDER:}
    signature: ${HUAWEI_SMS_SIGNATURE:}
    template:
      china: ${HUAWEI_SMS_TEMPLATE_CHINA:}
      global: ${HUAWEI_SMS_TEMPLATE_GLOBAL:}

request:
  validate:
    token: ${REQUEST_VALIDATE_TOKEN:}

app:
  cron:
    secret: ${CRON_SECRET:}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173}

r2:
  endpoint: ${R2_ENDPOINT:}
  accessKeyId: ${R2_ACCESS_KEY_ID:}
  secretAccessKey: ${R2_SECRET_ACCESS_KEY:}
  bucketName: ${R2_BUCKET_NAME:gdeiassistant-userdata}
  customDomain: ${R2_CUSTOM_DOMAIN:}

theme:
  grayscale: ${THEME_GRAYSCALE:0}

observability:
  slow-request-threshold-ms: ${SLOW_REQUEST_THRESHOLD_MS:800}
  slow-query-threshold-ms: ${SLOW_QUERY_THRESHOLD_MS:1500}

resilience4j:
  circuitbreaker:
    configs:
      eduSystem:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 8s
        slow-call-rate-threshold: 80
      cardSystem:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 10s
        slow-call-rate-threshold: 80
    instances:
      eduSystem:
        base-config: eduSystem
      cardSystem:
        base-config: cardSystem
